<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | DurielBiz POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-100 px-4">
    <div class="w-full max-w-lg rounded-2xl bg-white p-8 shadow-sm">
        <h1 class="text-2xl font-semibold text-slate-900">A Server Error Occurred</h1>
        <p class="mt-3 text-sm text-slate-600">
            The desktop app hit an internal error. Close the browser tab, reopen the app, and try again.
        </p>
        <p class="mt-3 text-sm text-slate-600">
            If the problem continues, check the launcher log in <code class="rounded bg-slate-100 px-1 py-0.5">%LOCALAPPDATA%\DurielBizPOS\launcher.log</code>.
        </p>
        <div class="mt-6">
            <a href="/accounts/login/" class="rounded-xl bg-slate-900 px-4 py-2 text-sm text-white">Back to Login</a>
        </div>
    </div>
</body>
</html>
