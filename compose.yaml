services:
  web:
    build: .
    command:
      - sh
      - -c
      - >-
        python manage.py migrate &&
        python manage.py createcachetable &&
        exec gunicorn pos_system.wsgi:application
        --bind 0.0.0.0:8000
        --workers 2 --worker-class gthread --threads 4
        --timeout 120 --graceful-timeout 120
        --access-logfile -
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
