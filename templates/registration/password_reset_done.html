<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent | DurielTech</title>
    <script src="{% static 'js/vendor/tailwind.js' %}"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-950 px-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-2xl">
        <p class="text-sm font-medium text-cyan-700">DurielTech</p>
        <h1 class="mt-2 text-2xl font-semibold text-slate-900">Check your email</h1>
        <p class="mt-3 text-sm text-slate-500">If an account exists for that email address, we've sent a 6-digit verification code. It expires in 10 minutes.</p>
        <a href="{% url 'accounts:password-reset-confirm' %}" class="mt-6 block w-full rounded-lg bg-slate-900 px-4 py-2 text-center text-white hover:bg-slate-800">Enter the code</a>
        <p class="mt-4 text-center text-sm text-slate-500">
            <a href="{% url 'accounts:login' %}" class="font-medium text-slate-900 hover:underline">Back to login</a>
        </p>
    </div>
</body>
</html>
