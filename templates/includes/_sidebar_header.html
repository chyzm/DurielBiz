{% load static %}
<div class="flex items-center justify-between border-b border-slate-800 px-5 py-5">
    <div class="flex items-center gap-3">
        <img src="{% static 'img/logo-mark.svg' %}" alt="" class="h-9 w-9 rounded-lg" width="36" height="36">
        <div>
            <h1 class="text-lg font-semibold leading-tight">DurielBiz POS</h1>
            <p class="mt-0.5 text-xs text-slate-400">Retail. Simplified.</p>
        </div>
    </div>
    {% if show_close %}

    {% endif %}
</div>
