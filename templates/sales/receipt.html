<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ sale.receipt_number }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .receipt-paper {
            width: 100%;
            max-width: 80mm;
            margin: 0 auto;
        }

        @page {
            size: {{ business_settings.thermal_paper_width|default:"80mm" }} auto;
            margin: 4mm;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .receipt-paper {
                max-width: {{ business_settings.thermal_paper_width|default:"80mm" }};
                width: {{ business_settings.thermal_paper_width|default:"80mm" }};
                border-radius: 0;
                box-shadow: none;
                padding: 0;
            }

            a,
            button {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-100 p-6">
    <div class="mx-auto max-w-md">
        {% include "sales/_receipt_content.html" with sale=sale %}
        <div class="mt-6 flex gap-3">
            <a href="{% url 'sales:pos' %}" class="flex-1 rounded-xl border border-slate-300 px-4 py-2 text-center text-sm">Back to POS</a>
            <button onclick="window.print()" class="flex-1 rounded-xl bg-slate-900 px-4 py-2 text-sm text-white">Print</button>
        </div>
    </div>
</body>
</html>
