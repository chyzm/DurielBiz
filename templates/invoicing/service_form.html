{% extends "invoicing/base.html" %}

{% block title %}{{ page_title }}{% endblock %}
{% block heading %}{{ page_title }}{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl rounded-[2rem] border border-white/10 bg-white/5 p-8">
    <form method="post" class="space-y-5">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="text-sm text-slate-300" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<p class="mt-1 text-sm text-rose-300">{{ error }}</p>{% endfor %}
            </div>
        {% endfor %}
        <button class="rounded-2xl bg-cyan-400 px-5 py-3 text-sm font-semibold text-slate-950">Save Service</button>
    </form>
</div>
{% endblock %}
