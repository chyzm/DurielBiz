<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Expired | DurielBiz POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex min-h-screen items-center justify-center bg-slate-100 px-4">
    <div class="w-full max-w-lg rounded-2xl bg-white p-8 shadow-sm">
        <h1 class="text-2xl font-semibold text-slate-900">Session Expired</h1>
        <p class="mt-3 text-sm text-slate-600">
            Your login page is no longer valid. Reload the sign-in page and try again.
        </p>
        {% if reason %}
            <p class="mt-3 rounded-xl bg-slate-50 px-4 py-3 text-xs text-slate-500">{{ reason }}</p>
        {% endif %}
        <div class="mt-6 flex gap-3">
            <a href="/accounts/login/" class="rounded-xl bg-slate-900 px-4 py-2 text-sm text-white">Back to Login</a>
            <button onclick="window.location.reload()" class="rounded-xl border border-slate-300 px-4 py-2 text-sm">Reload Page</button>
        </div>
    </div>
</body>
</html>
