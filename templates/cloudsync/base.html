<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DurielBiz Cloud{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="flex min-h-screen">
        <aside class="hidden w-64 bg-slate-950 text-slate-100 lg:block">
            <div class="border-b border-slate-800 px-6 py-5">
                <h1 class="text-xl font-semibold">DurielBiz Cloud</h1>
                <p class="mt-1 text-sm text-slate-400">{{ business.name|default:"Remote dashboard" }}</p>
            </div>
            <nav class="space-y-1 px-4 py-4 text-sm">
                <a href="{% url 'cloudsync:dashboard' %}" class="block rounded-lg px-3 py-2 hover:bg-slate-800">Overview</a>
                <a href="{% url 'cloudsync:sales' %}" class="block rounded-lg px-3 py-2 hover:bg-slate-800">Sales</a>
                <a href="{% url 'cloudsync:branches' %}" class="block rounded-lg px-3 py-2 hover:bg-slate-800">Branches</a>
                <a href="{% url 'cloudsync:settings' %}" class="block rounded-lg px-3 py-2 hover:bg-slate-800">Sync Settings</a>
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button class="block w-full rounded-lg px-3 py-2 text-left hover:bg-slate-800">Logout</button>
                </form>
            </nav>
        </aside>
        <main class="flex-1">
            <header class="border-b border-slate-200 bg-white px-6 py-4">
                <p class="text-sm text-slate-500">Business</p>
                <h2 class="text-xl font-semibold">{{ business.name|default:"DurielBiz Cloud" }}</h2>
            </header>
            <div class="px-6 py-6">
                {% if messages %}
                    <div class="mb-4 space-y-2">
                        {% for message in messages %}
                            <div class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
