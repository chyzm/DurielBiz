{% extends "base.html" %}

{% block title %}Delete Branch | DurielBiz POS{% endblock %}

{% block content %}
    <section class="mx-auto max-w-xl rounded-2xl bg-white p-6 shadow-sm">
        <h3 class="text-lg font-semibold">Delete Branch</h3>
        <p class="mt-2 text-sm text-slate-500">Delete <span class="font-medium text-slate-900">{{ branch.name }}</span>? Existing transactions keep their records and branch links are cleared where needed.</p>
        <form method="post" class="mt-6 flex justify-end gap-3">
            {% csrf_token %}
            <a href="{% url 'reports:branch-list' %}" class="rounded-xl border border-slate-300 px-4 py-2 text-sm">Cancel</a>
            <button class="rounded-xl bg-rose-600 px-4 py-2 text-sm text-white">Delete Branch</button>
        </form>
    </section>
{% endblock %}
